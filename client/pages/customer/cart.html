<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart | Oncampus Marketplace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container">
        <a class="navbar-brand text-white" href="dashboard.html"
          >Oncampus Marketplace</a
        >
        <button
          class="navbar-toggler border-0 text-white"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <a class="nav-link text-white-50" href="dashboard.html"
                >Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white-50" href="home.html">Browse</a>
            </li>
            <li class="nav-item">
              <a
                class="btn btn-outline-light btn-sm position-relative"
                href="cart.html"
              >
                <i class="fas fa-cart-shopping"></i> Cart
                <span
                  id="cartCount"
                  class="badge rounded-pill bg-danger"
                  style="display: none; margin-left: 4px"
                  >0</span
                >
              </a>
            </li>
            <li class="nav-item">
              <span class="text-white-50 small" id="customerName"></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-light btn-sm" id="logoutBtn">
                <i class="fas fa-right-from-bracket"></i> Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">My Cart</h2>
        <a href="home.html" class="btn btn-outline-primary btn-sm">
          <i class="fas fa-arrow-left"></i> Continue Shopping
        </a>
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">Cart Items</div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                  <thead>
                    <tr>
                      <th>Product</th>
                      <th>Price</th>
                      <th>Quantity</th>
                      <th>Subtotal</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="cartTable"></tbody>
                </table>
              </div>
              <div id="emptyCart" class="empty-state" style="display: none">
                <i class="fas fa-cart-shopping"></i>
                <h5>Your cart is empty</h5>
                <p>Browse the marketplace and add products you like.</p>
                <a href="home.html" class="btn btn-primary btn-sm">
                  <i class="fas fa-store"></i> Browse Products
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card">
            <div class="card-header">Order Summary</div>
            <div class="card-body">
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Items</span>
                <span id="summaryCount">0</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">Subtotal</span>
                <span id="summaryTotal" class="fw-bold">₦0.00</span>
              </div>
              <button class="btn btn-primary w-100" id="checkoutBtn">
                <i class="fas fa-lock"></i> Proceed to Checkout
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/api-service.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../assets/js/customer/cart-utils.js"></script>
    <script src="../../assets/js/customer/cart.js"></script>
  </body>
</html>
