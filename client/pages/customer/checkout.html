<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Oncampus Marketplace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container">
        <a class="navbar-brand text-white" href="dashboard.html"
          >Oncampus Marketplace</a
        >
        <button
          class="navbar-toggler border-0 text-white"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <a class="nav-link text-white-50" href="dashboard.html"
                >Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white-50" href="home.html">Browse</a>
            </li>
            <li class="nav-item">
              <a
                class="btn btn-outline-light btn-sm position-relative"
                href="cart.html"
              >
                <i class="fas fa-cart-shopping"></i> Cart
                <span
                  id="cartCount"
                  class="badge rounded-pill bg-danger"
                  style="display: none; margin-left: 4px"
                  >0</span
                >
              </a>
            </li>
            <li class="nav-item">
              <span class="text-white-50 small" id="customerName"></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-light btn-sm" id="logoutBtn">
                <i class="fas fa-right-from-bracket"></i> Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <h2 class="fw-bold mb-4">Checkout</h2>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card mb-4">
            <div class="card-header">Shipping Details</div>
            <div class="card-body">
              <form id="checkoutForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input
                      type="text"
                      id="fullName"
                      class="form-control"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input
                      type="text"
                      id="phone"
                      class="form-control"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Delivery Address</label>
                    <textarea
                      id="address"
                      class="form-control"
                      rows="3"
                      required
                    ></textarea>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <div class="card">
            <div class="card-header">Payment Method</div>
            <div class="card-body">
              <div class="form-check mb-2">
                <input
                  class="form-check-input"
                  type="radio"
                  name="paymentMethod"
                  id="payOnDelivery"
                  checked
                />
                <label class="form-check-label" for="payOnDelivery">
                  Pay on Delivery
                </label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="paymentMethod"
                  id="payOnline"
                  disabled
                />
                <label class="form-check-label text-muted" for="payOnline">
                  Pay Online (coming soon)
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card">
            <div class="card-header">Order Summary</div>
            <div class="card-body">
              <div id="checkoutItems"></div>
              <hr />
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Items</span>
                <span id="summaryCount">0</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span class="fw-bold">Total</span>
                <span id="summaryTotal" class="fw-bold text-success"
                  >₦0.00</span
                >
              </div>
              <button class="btn btn-primary w-100" id="placeOrderBtn">
                <i class="fas fa-check"></i> Place Order
              </button>
              <a href="cart.html" class="btn btn-link w-100 mt-2"
                >Back to Cart</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/api-service.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../assets/js/customer/cart-utils.js"></script>
    <script src="../../assets/js/customer/checkout.js"></script>
  </body>
</html>
