<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Products | Oncampus Marketplace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container">
        <a class="navbar-brand text-white" href="dashboard.html"
          >Oncampus Marketplace</a
        >
        <button
          class="navbar-toggler border-0 text-white"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <a class="nav-link text-white-50" href="dashboard.html"
                >Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white fw-semibold" href="home.html"
                >Browse</a
              >
            </li>
            <li class="nav-item">
              <a
                class="btn btn-outline-light btn-sm position-relative"
                href="cart.html"
              >
                <i class="fas fa-cart-shopping"></i> Cart
                <span
                  id="cartCount"
                  class="badge rounded-pill bg-danger"
                  style="display: none; margin-left: 4px"
                  >0</span
                >
              </a>
            </li>
            <li class="nav-item">
              <span class="text-white-50 small" id="customerName"></span>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-light btn-sm" id="logoutBtn">
                <i class="fas fa-right-from-bracket"></i> Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Search & Filter Bar -->
    <section class="search-filter-section py-4 border-bottom">
      <div class="container">
        <div class="row g-3">
          <div class="col-md-6">
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0">
                <i class="fas fa-search"></i>
              </span>
              <input
                type="text"
                id="productSearch"
                class="form-control border-start-0"
                placeholder="Search products..."
              />
            </div>
          </div>
          <div class="col-md-3">
            <select id="categoryFilter" class="form-select">
              <option value="">All Categories</option>
            </select>
          </div>
          <div class="col-md-3">
            <select id="sortFilter" class="form-select">
              <option value="newest">Newest First</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Product Listing Section -->
    <section class="products-section py-5">
      <div class="container">
        <h3 class="mb-4">Available Products</h3>
        <div id="productsContainer" class="row g-4">
          <div class="col-12 text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
        <div
          id="noProducts"
          class="alert alert-info text-center"
          style="display: none"
        >
          No products found. Try adjusting your search or filters.
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/api-service.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script src="../../assets/js/customer/cart-utils.js"></script>
    <script src="../../assets/js/customer/home.js"></script>
  </body>
</html>
