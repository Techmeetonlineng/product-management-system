<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Categories | Product Management System</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../assets/css/admin.css" />
  </head>

  <body>
    <div class="wrapper">
      <!-- Sidebar -->

      <aside class="sidebar">
        <div class="logo">
          <h3>OnCampus</h3>
        </div>

        <ul>
          <li>
            <a href="dashboard.html">
              <i class="fas fa-home"></i>
              Dashboard
            </a>
          </li>

          <li class="active">
            <a href="categories.html">
              <i class="fas fa-list"></i>
              Categories
            </a>
          </li>

          <li>
            <a href="products.html">
              <i class="fas fa-box"></i>
              Products
            </a>
          </li>

          <li>
            <a href="vendors.html">
              <i class="fas fa-store"></i>
              Vendors
            </a>
          </li>

          <li>
            <a href="approvals.html">
              <i class="fas fa-check-circle"></i>
              Approvals
            </a>
          </li>

          <li>
            <a href="customers.html">
              <i class="fas fa-users"></i>
              Customers
            </a>
          </li>

          <li>
            <a href="reports.html">
              <i class="fas fa-chart-line"></i>
              Reports
            </a>
          </li>

          <li>
            <a href="profile.html">
              <i class="fas fa-user"></i>
              Profile
            </a>
          </li>

          <li>
            <a href="settings.html">
              <i class="fas fa-cog"></i>
              Settings
            </a>
          </li>

          <li>
            <a href="../../login.html" id="logoutBtn">
              <i class="fas fa-right-from-bracket"></i>
              Logout
            </a>
          </li>
        </ul>
      </aside>

      <!-- Main Content -->

      <main class="main-content">
        <!-- Topbar -->

        <nav class="topbar">
          <h2>Category Management</h2>

          <div>
            <button
              class="btn btn-primary"
              data-bs-toggle="modal"
              data-bs-target="#categoryModal"
            >
              <i class="fas fa-plus"></i>

              Add Category
            </button>
          </div>
        </nav>

        <!-- Search -->

        <div class="row mt-4">
          <div class="col-md-4">
            <input
              type="text"
              id="searchCategory"
              class="form-control"
              placeholder="Search Category..."
            />
          </div>
        </div>

        <!-- Table -->

        <div class="card mt-4">
          <div class="card-header">Categories</div>

          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered table-hover">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>

                    <th>Name</th>

                    <th>Description</th>

                    <th>Status</th>

                    <th>Created</th>

                    <th width="180">Action</th>
                  </tr>
                </thead>

                <tbody id="categoryTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal -->

    <div class="modal fade" id="categoryModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 id="modalTitle">Add Category</h5>

            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="categoryId" />

            <div class="mb-3">
              <label class="form-label"> Category Name </label>

              <input type="text" id="categoryName" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label"> Description </label>

              <textarea
                id="description"
                class="form-control"
                rows="3"
              ></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label"> Status </label>

              <select id="status" class="form-select">
                <option value="Active">Active</option>

                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>

            <button class="btn btn-primary" id="saveCategory">
              Save Category
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/api-service.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/app.js"></script>

    <script src="../../assets/js/admin/categories.js"></script>
  </body>
</html>
