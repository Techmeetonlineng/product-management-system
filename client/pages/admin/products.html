<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Product Management System | Products</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- SweetAlert -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS -->

    <link
        rel="stylesheet"
        href="../../assets/css/admin.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <h3>PMS</h3>

        </div>

        <ul class="sidebar-menu">

            <li>

                <a href="dashboard.html">

                    <i class="fa-solid fa-gauge"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="categories.html">

                    <i class="fa-solid fa-layer-group"></i>

                    Categories

                </a>

            </li>

            <li class="active">

                <a href="products.html">

                    <i class="fa-solid fa-box"></i>

                    Products

                </a>

            </li>

            <li>

                <a href="vendors.html">

                    <i class="fa-solid fa-store"></i>

                    Vendors

                </a>

            </li>

            <li>

                <a href="approvals.html">

                    <i class="fa-solid fa-circle-check"></i>

                    Approvals

                </a>

            </li>

            <li>

                <a href="customers.html">

                    <i class="fa-solid fa-users"></i>

                    Customers

                </a>

            </li>

            <li>

                <a href="reports.html">

                    <i class="fa-solid fa-chart-column"></i>

                    Reports

                </a>

            </li>

            <li>

                <a href="../../login.html">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </a>

            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <!-- Header -->

        <div
            class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2>

                    Product Management

                </h2>

                <p class="text-muted">

                    Manage all marketplace products

                </p>

            </div>

        <!-- Filters -->

        <div class="card mb-4">

            <div class="card-body">

                <div class="row">

                    <div class="col-md-4">

                        <input

                            id="searchProduct"

                            class="form-control"

                            type="text"

                            placeholder="Search product...">

                    </div>

                    <div class="col-md-3">

                        <select

                            id="filterCategory"

                            class="form-select">

                            <option value="">

                                All Categories

                            </option>

                        </select>

                    </div>

                    <div class="col-md-3">

                        <select

                            id="filterStatus"

                            class="form-select">

                            <option value="">

                                All Status

                            </option>

                            <option value="Available">

                                Available

                            </option>

                            <option value="Unavailable">

                                Unavailable

                            </option>

                        </select>

                    </div>

                    <div class="col-md-2">

                        <button

                            id="refreshProducts"

                            class="btn btn-secondary w-100">

                            <i class="fa-solid fa-rotate"></i>

                            Refresh

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- Product Table -->

        <div class="card">

            <div class="card-header">

                <strong>

                    Product List

                </strong>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table

                        class="table table-bordered table-hover align-middle">

                        <thead class="table-dark">

                        <tr>

                            <th>ID</th>

                            <th>Image</th>

                            <th>Name</th>

                            <th>Category</th>

                            <th>Vendor</th>

                            <th>Price</th>

                            <th>Stock</th>

                            <th>Status</th>

                            <th>Approval</th>

                            <th width="180">

                                Action

                            </th>

                        </tr>

                        </thead>

                        <tbody id="productTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <!-- Product Modal -->

        <div

            class="modal fade"

            id="productModal"

            tabindex="-1"

            aria-hidden="true">

            <div class="modal-dialog modal-lg">

                <div class="modal-content">

                    <div class="modal-header">

                        <h5 class="modal-title">

                            Product

                        </h5>

                        <button

                            class="btn-close"

                            data-bs-dismiss="modal">

                        </button>

                    </div>

                    <div class="modal-body">

                        <form id="productForm">

                            <input

                                type="hidden"

                                id="productId">

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label>

                                        Product Name

                                    </label>

                                    <input

                                        id="product_name"

                                        class="form-control"

                                        required>
                                                                            <input
                                        type="text"
                                        name="product_name"
                                        class="form-control"
                                        required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">

                                        Category

                                    </label>

                                    <select
                                        id="category_id"
                                        name="category_id"
                                        class="form-select"
                                        required>

                                        <option value="">
                                            Select Category
                                        </option>

                                    </select>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">

                                        SKU

                                    </label>

                                    <input
                                        type="text"
                                        id="sku"
                                        name="sku"
                                        class="form-control">

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">

                                        Price

                                    </label>

                                    <input
                                        type="number"
                                        id="price"
                                        name="price"
                                        step="0.01"
                                        class="form-control"
                                        required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">

                                        Quantity

                                    </label>

                                    <input
                                        type="number"
                                        id="quantity"
                                        name="quantity"
                                        class="form-control"
                                        required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">

                                        Product Status

                                    </label>

                                    <select
                                        id="product_status"
                                        name="product_status"
                                        class="form-select">

                                        <option value="Available">
                                            Available
                                        </option>

                                        <option value="Unavailable">
                                            Unavailable
                                        </option>

                                    </select>

                                </div>

                                <div class="col-12 mb-3">

                                    <label class="form-label">

                                        Description

                                    </label>

                                    <textarea
                                        id="description"
                                        name="description"
                                        rows="4"
                                        class="form-control"></textarea>

                                </div>

                            </div>

                        </form>

                    </div>

                    <div class="modal-footer">

                        <button
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                            Close

                        </button>

                        <button
                            id="saveProductBtn"
                            class="btn btn-primary">

                            Save Product

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/api-service.js"></script>
<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/app.js"></script>

<script src="../../assets/js/admin/products.js"></script>

</body>

</html>
