<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Vendor Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>

            <i class="fa fa-user"></i>

            Vendor Profile

        </h3>

        <a href="dashboard.html"
            class="btn btn-secondary">

            <i class="fa fa-arrow-left"></i>

            Dashboard

        </a>

    </div>

    <div class="card">

        <div class="card-header bg-primary text-white">

            My Information

        </div>

        <div class="card-body">

            <form id="profileForm">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            First Name

                        </label>

                        <input
                            type="text"
                            id="first_name"
                            class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Last Name

                        </label>

                        <input
                            type="text"
                            id="last_name"
                            class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Phone Number

                        </label>

                        <input
                            type="text"
                            id="phone"
                            class="form-control">

                    </div>

                    <div class="col-12 mb-3">

                        <label class="form-label">

                            Address

                        </label>

                        <textarea
                            id="address"
                            class="form-control"
                            rows="3"></textarea>

                    </div>

                </div>

                <button
                    type="button"
                    class="btn btn-primary"
                    id="saveProfile">

                    <i class="fa fa-save"></i>

                    Save Changes

                </button>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="../../assets/js/vendor/profile.js"></script>

</body>

</html>
